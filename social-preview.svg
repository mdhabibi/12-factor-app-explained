<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10152a"/>
      <stop offset="1" stop-color="#0c0f1d"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="0.5" stop-color="#7c5cff"/>
      <stop offset="1" stop-color="#26d3a4"/>
    </linearGradient>
    <linearGradient id="num" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5b8cff"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#26d3a4"/>
      <stop offset="1" stop-color="#5b8cff"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <circle cx="1080" cy="120" r="260" fill="#5b8cff" opacity="0.10"/>
  <circle cx="1180" cy="560" r="220" fill="#26d3a4" opacity="0.08"/>
  <rect x="0" y="0" width="1280" height="8" fill="url(#brand)"/>

  <!-- kicker -->
  <rect x="80" y="92" width="468" height="46" rx="23" fill="none" stroke="#2a3354" stroke-width="1.5"/>
  <text x="104" y="122" fill="#26d3a4" font-size="20" font-weight="700" letter-spacing="4">CLOUD-NATIVE FUNDAMENTALS</text>

  <!-- big "12" badge -->
  <rect x="80" y="196" width="150" height="150" rx="28" fill="url(#num)"/>
  <text x="155" y="304" text-anchor="middle" fill="#ffffff" font-size="92" font-weight="800">12</text>

  <!-- title -->
  <text x="256" y="252" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-1">The 12-Factor App</text>
  <text x="258" y="322" fill="url(#brand)" font-size="44" font-weight="800" letter-spacing="-0.5">Explained for Beginners</text>

  <!-- subtitle -->
  <text x="82" y="416" fill="#aab3cc" font-size="27">Build apps that scale, deploy &amp; survive — with plain-English</text>
  <text x="82" y="452" fill="#aab3cc" font-size="27">analogies, Python examples, and diagrams.</text>

  <!-- feature chips (dot + text, no emoji so it renders everywhere) -->
  <g font-size="22" font-weight="600">
    <rect x="80"  y="502" width="244" height="58" rx="29" fill="#1a2036" stroke="#2a3354"/>
    <circle cx="110" cy="531" r="7" fill="#26d3a4"/>
    <text x="128" y="539" fill="#e7ecf6">Python examples</text>

    <rect x="340" y="502" width="196" height="58" rx="29" fill="#1a2036" stroke="#2a3354"/>
    <circle cx="370" cy="531" r="7" fill="#5b8cff"/>
    <text x="388" y="539" fill="#e7ecf6">11 diagrams</text>

    <rect x="552" y="502" width="206" height="58" rx="29" fill="#1a2036" stroke="#2a3354"/>
    <circle cx="582" cy="531" r="7" fill="#7c5cff"/>
    <text x="600" y="539" fill="#e7ecf6">40+ glossary</text>

    <rect x="774" y="502" width="244" height="58" rx="29" fill="#1a2036" stroke="#2a3354"/>
    <circle cx="804" cy="531" r="7" fill="#26d3a4"/>
    <text x="822" y="539" fill="#e7ecf6">No setup needed</text>
  </g>

  <!-- right-side factor list -->
  <g font-size="19" font-weight="700">
    <rect x="988" y="150" width="212" height="46" rx="10" fill="url(#num)" opacity="0.92"/>
    <text x="1008" y="179" fill="#ffffff">1 · Codebase</text>
    <rect x="988" y="206" width="212" height="46" rx="10" fill="url(#green)" opacity="0.92"/>
    <text x="1008" y="235" fill="#06231c">3 · Config</text>
    <rect x="988" y="262" width="212" height="46" rx="10" fill="url(#num)" opacity="0.92"/>
    <text x="1008" y="291" fill="#ffffff">6 · Processes</text>
    <rect x="988" y="318" width="212" height="46" rx="10" fill="url(#green)" opacity="0.92"/>
    <text x="1008" y="347" fill="#06231c">8 · Concurrency</text>
    <rect x="988" y="374" width="212" height="46" rx="10" fill="url(#num)" opacity="0.92"/>
    <text x="1008" y="403" fill="#ffffff">11 · Logs</text>
    <text x="1094" y="450" text-anchor="middle" fill="#9aa6c4" font-size="22" font-weight="700">…all 12 factors</text>
  </g>

  <!-- footer -->
  <text x="82" y="602" fill="#6b7394" font-size="22" font-weight="600">github.com/mdhabibi/12-factor-app-explained</text>
  <text x="1198" y="602" text-anchor="end" fill="#6b7394" font-size="20">MIT · free to share</text>
</svg>
